version: "3.9"

services:
  db:
    image: postgres:15
    container_name: task_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - task_network

  backend:
    build: ./backend
    container_name: task_backend
    restart: always
    depends_on:
      - db
    ports:
      - "5000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/taskdb
      JWT_SECRET: mysecret
      PORT: 3000
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm run start:prod"
    networks:
      - task_network

  client:
    build: ./admin
    container_name: task_client
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    networks:
      - task_network

volumes:
  pgdata:

networks:
  task_network:
    driver: bridge
